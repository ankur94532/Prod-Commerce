apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: gocommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      containers:
        - name: analytics-service
          image: analytics-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8086
          env:
            - name: SERVER_PORT
              value: "8086"

            # Postgres for analytics
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://host.docker.internal:5432/ecom_analytics"
            - name: SPRING_DATASOURCE_USERNAME
              value: "ecom_user"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "ecom_pass"

            # Kafka on host (for order.created events)
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "host.docker.internal:9092"

            - name: SECURITY_JWT_SECRET
              value: "this_is_a_dev_secret_change_later_1234567890"
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: gocommerce
spec:
  selector:
    app: analytics-service
  ports:
    - port: 8086
      targetPort: 8086
