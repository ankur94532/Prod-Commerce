apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
  namespace: gocommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cart-service
  template:
    metadata:
      labels:
        app: cart-service
    spec:
      containers:
        - name: cart-service
          image: cart-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          env:
            # Point Redis host to Docker Desktop host, not localhost in the pod
            - name: SPRING_DATA_REDIS_HOST
              value: host.docker.internal
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"

            # Optional: override JWT secret via env (matches security.jwt.secret)
            - name: SECURITY_JWT_SECRET
              value: "this_is_a_dev_secret_change_later_1234567890"

          readinessProbe:
            httpGet:
              path: /api/v1/cart/health
              port: 8083
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/cart/health
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: cart-service
  namespace: gocommerce
spec:
  selector:
    app: cart-service
  ports:
    - name: http
      port: 8083
      targetPort: 8083
  type: ClusterIP
