name: Docker Images

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth-service
            context: backend/auth-service
          - service: catalog-service
            context: backend/catalog-service
          - service: cart-service
            context: backend/cart-service
          - service: api-gateway
            context: backend/api-gateway
          - service: search-service
            context: backend/search-service
          - service: analytics-service
            context: backend/analytics-service
          - service: order-service
            context: backend/order-service
          - service: recommendation-service
            context: backend/recommendation-service
          - service: embedding-service
            context: backend/embedding-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        if: matrix.service != 'embedding-service'
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build backend jars
        if: matrix.service != 'embedding-service'
        run: mvn -f backend/pom.xml -pl ${{ matrix.service }} -am package -DskipTests

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name == 'push'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=sha
            type=ref,event=branch

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
