server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: search-service

  elasticsearch:
    uris: ${SPRING_ELASTICSEARCH_URIS:http://localhost:9200}

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      database: ${SPRING_DATA_REDIS_DATABASE:2}

catalog:
  base-url: ${CATALOG_BASE_URL:http://localhost:8082}

recommendation:
  base-url: ${RECOMMENDATION_BASE_URL:http://localhost:8087}

embedding:
  base-url: ${EMBEDDING_SERVICE_BASE_URL:http://localhost:8090}
  dimensions: ${EMBEDDING_DIMENSIONS:384}

search:
  http:
    connect-timeout: ${SEARCH_HTTP_CONNECT_TIMEOUT:2s}
    read-timeout: ${SEARCH_HTTP_READ_TIMEOUT:5s}
  hybrid:
    keyword-weight: ${SEARCH_HYBRID_KEYWORD_WEIGHT:1.0}
    vector-weight: ${SEARCH_HYBRID_VECTOR_WEIGHT:1.5}
  indexing:
    batch-size: ${SEARCH_INDEXING_BATCH_SIZE:128}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    circuitbreakers:
      enabled: true
  metrics:
    tags:
      service: search-service
    distribution:
      percentiles-histogram:
        http.server.requests: true
  tracing:
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

resilience4j:
  circuitbreaker:
    instances:
      catalogClient:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true

      searchCore:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 50
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
        permitted-number-of-calls-in-half-open-state: 5
        automatic-transition-from-open-to-half-open-enabled: true

      recommendationClient:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true

      reindexJob:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 20s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
  retry:
    instances:
      catalogClient:
        max-attempts: 3
        wait-duration: 250ms
        retry-exceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException
      recommendationClient:
        max-attempts: 2
        wait-duration: 150ms
        retry-exceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException
      searchCore:
        max-attempts: 2
        wait-duration: 100ms
        retry-exceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
          - org.springframework.dao.TransientDataAccessException
