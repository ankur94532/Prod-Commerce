apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
  namespace: gocommerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cart-service
  template:
    metadata:
      labels:
        app: cart-service
    spec:
      containers:
        - name: cart-service
          image: cart-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8083
          envFrom:
            - configMapRef:
                name: gocommerce-config
            - secretRef:
                name: gocommerce-secrets
          env:
            - name: SERVER_PORT
              value: "8083"
            - name: SPRING_DATA_REDIS_DATABASE
              value: "0"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 45
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: cart-service
  namespace: gocommerce
spec:
  type: ClusterIP
  selector:
    app: cart-service
  ports:
    - name: http
      port: 8083
      targetPort: http
