server:
  port: ${SERVER_PORT:8085}

spring:
  application:
    name: order-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ecom_order}
    username: ${SPRING_DATASOURCE_USERNAME:ecom_user}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    properties:
      spring.json.add.type.headers: false

orders:
  outbox:
    publisher-delay-ms: ${ORDERS_OUTBOX_PUBLISHER_DELAY_MS:5000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      service: order-service
    distribution:
      percentiles-histogram:
        http.server.requests: true

security:
  jwt:
    secret: ${SECURITY_JWT_SECRET}

services:
  catalog:
    base-url: ${CATALOG_SERVICE_URL:http://catalog-service:8082}
