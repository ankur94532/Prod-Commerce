server:
  port: 8085

spring:
  application:
    name: order-service

  datasource:
    url: jdbc:postgresql://localhost:5432/ecom_order
    username: ecom_user
    password: ecom_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update # dev only
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    properties:
      spring.json.add.type.headers: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      service: order-service
    distribution:
      percentiles-histogram:
        http.server.requests: true

security:
  jwt:
    secret: "this_is_a_dev_secret_change_later_1234567890"

services:
  catalog:
    # In Kubernetes (cluster-internal):
    base-url: http://catalog-service:8082
    # For pure local dev with both services via mvn spring-boot:run,
    # you can override this with: http://localhost:8082
