server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:5432/ecom_auth
    username: ecom_user
    password: ecom_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update # dev-only; later we can use migrations
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

security:
  jwt:
    secret: "this_is_a_dev_secret_change_later_1234567890"
    access-token-ttl-minutes: 60
    refresh-token-ttl-days: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: auth-service
