services:
  postgres:
    image: postgres:16
    container_name: ecommerce-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ecom_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ecom_auth
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: ecommerce-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: ecommerce-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.2
    container_name: ecommerce-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"

  redis:
    image: redis:7
    container_name: ecommerce-redis
    ports:
      - "6379:6379"

  embedding-service:
    build:
      context: ./backend/embedding-service
    container_name: ecommerce-embedding-service
    environment:
      EMBEDDING_MODEL_PATH: ${EMBEDDING_MODEL_PATH:-/models/bge-small-en-v1.5}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-BAAI/bge-small-en-v1.5}
    ports:
      - "8090:8090"
    volumes:
      - ./models:/models:ro
      - embedding-cache:/root/.cache/huggingface

  prometheus:
    image: prom/prometheus:latest
    container_name: ecommerce-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.63.0
    container_name: ecommerce-jaeger
    ports:
      - "16686:16686"
      - "4317"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    container_name: ecommerce-otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yml"]
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./ops/otel/otel-collector-config.yml:/etc/otelcol-contrib/config.yml:ro
    depends_on:
      - jaeger
    restart: unless-stopped

  loki:
    image: grafana/loki:3.2.1
    container_name: ecommerce-loki
    command: ["-config.file=/etc/loki/config.yml"]
    ports:
      - "3100:3100"
    volumes:
      - ./ops/loki/loki-config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.2.1
    container_name: ecommerce-promtail
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./ops/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: ecommerce-grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD in .env}
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
    restart: unless-stopped

volumes:
  pgdata:
  embedding-cache:
  loki-data:
