apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: gocommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      containers:
        - name: catalog-service
          image: catalog-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          env:
            - name: SERVER_PORT
              value: "8082"

            # Postgres from host
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://host.docker.internal:5432/ecom_catalog"
            - name: SPRING_DATASOURCE_USERNAME
              value: "ecom_user"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "ecom_pass"

            - name: SECURITY_JWT_SECRET
              value: "this_is_a_dev_secret_change_later_1234567890"

---
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
  namespace: gocommerce
spec:
  selector:
    app: catalog-service
  ports:
    - port: 8082
      targetPort: 8082
