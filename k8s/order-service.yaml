apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: gocommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: order-service:latest # built with spring-boot:build-image
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8085
          env:
            # Tell Spring which port to bind on inside the pod
            - name: SERVER_PORT
              value: "8085"

            # Override the DB URL so it doesn't use `localhost` inside the pod
            # Assuming Postgres is running on your Docker Desktop host at 5432
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://host.docker.internal:5432/ecom_order"
            - name: SPRING_DATASOURCE_USERNAME
              value: "ecom_user"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "ecom_pass"
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "host.docker.internal:9092"
            # Same JWT secret as your other services
            - name: SECURITY_JWT_SECRET
              value: "this_is_a_dev_secret_change_later_1234567890"

---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: gocommerce
spec:
  selector:
    app: order-service
  ports:
    - port: 8085 # cluster port
      targetPort: 8085 # containerPort
