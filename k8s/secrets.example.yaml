# Copy this file to secrets.yaml, replace the values, and apply it separately.
# Do not commit real production secrets.
apiVersion: v1
kind: Secret
metadata:
  name: gocommerce-secrets
  namespace: gocommerce
type: Opaque
stringData:
  SPRING_DATASOURCE_PASSWORD: "replace-with-db-password"
  SECURITY_JWT_SECRET: "replace-with-at-least-32-character-jwt-secret"
