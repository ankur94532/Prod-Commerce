apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: gocommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            # Gateway port inside pod
            - name: SERVER_PORT
              value: "8080"

            # Redis for rate limiting → use host.docker.internal (Docker Desktop host)
            - name: SPRING_DATA_REDIS_HOST
              value: "host.docker.internal"
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
            - name: SPRING_DATA_REDIS_DATABASE
              value: "0"

            # Downstream service URIs (inside same namespace we can use short service names)
            - name: AUTH_SERVICE_URI
              value: "http://auth-service:8081"
            - name: CATALOG_SERVICE_URI
              value: "http://catalog-service:8082"
            - name: CART_SERVICE_URI
              value: "http://cart-service:8083"
            - name: SEARCH_SERVICE_URI
              value: "http://search-service:8084"
            - name: ORDER_SERVICE_URI
              value: "http://order-service:8085"
            - name: ANALYTICS_SERVICE_URI
              value: "http://analytics-service:8086"
            - name: RECOMMENDATION_SERVICE_URI
              value: "http://recommendation-service:8087"

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: gocommerce
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
