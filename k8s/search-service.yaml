apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-service
  namespace: gocommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: search-service
  template:
    metadata:
      labels:
        app: search-service
    spec:
      containers:
        - name: search-service
          image: search-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8084
          env:
            # Spring Boot server port inside pod
            - name: SERVER_PORT
              value: "8084"

            # Elasticsearch on Docker Desktop host
            - name: SPRING_ELASTICSEARCH_URIS
              value: "http://host.docker.internal:9200"

            # Redis cache
            - name: SPRING_DATA_REDIS_HOST
              value: "host.docker.internal"
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
            - name: SPRING_DATA_REDIS_DATABASE
              value: "2"

            # Catalog base-url (for CatalogClient)
            - name: CATALOG_BASE_URL
              value: "http://catalog-service:8082"

            # 🔹 NEW: Recommendation base-url (for RecommendationClient)
            - name: RECOMMENDATION_BASE_URL
              value: "http://recommendation-service.gocommerce:8087"
              # or simply "http://recommendation-service:8087"

            # JWT secret
            - name: SECURITY_JWT_SECRET
              value: "this_is_a_dev_secret_change_later_1234567890"
---
apiVersion: v1
kind: Service
metadata:
  name: search-service
  namespace: gocommerce
spec:
  selector:
    app: search-service
  ports:
    - port: 8084
      targetPort: 8084
