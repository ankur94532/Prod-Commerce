apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendation-service
  namespace: gocommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recommendation-service
  template:
    metadata:
      labels:
        app: recommendation-service
    spec:
      containers:
        - name: recommendation-service
          image: recommendation-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8087
          env:
            - name: SERVER_PORT
              value: "8087"

            # If reco has its own DB:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://host.docker.internal:5432/ecom_recommendation"
            - name: SPRING_DATASOURCE_USERNAME
              value: "ecom_user"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "ecom_pass"

            # Kafka for consuming order.created
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "host.docker.internal:9092"

            - name: SECURITY_JWT_SECRET
              value: "this_is_a_dev_secret_change_later_1234567890"
---
apiVersion: v1
kind: Service
metadata:
  name: recommendation-service
  namespace: gocommerce
spec:
  selector:
    app: recommendation-service
  ports:
    - port: 8087
      targetPort: 8087
