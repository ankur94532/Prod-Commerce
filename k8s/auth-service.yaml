apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: gocommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: SERVER_PORT
              value: "8081"

            # Postgres on your host
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://host.docker.internal:5432/ecom_auth"
            - name: SPRING_DATASOURCE_USERNAME
              value: "ecom_user"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "ecom_pass"

            # Shared JWT secret
            - name: SECURITY_JWT_SECRET
              value: "this_is_a_dev_secret_change_later_1234567890"

---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: gocommerce
spec:
  selector:
    app: auth-service
  ports:
    - port: 8081
      targetPort: 8081
