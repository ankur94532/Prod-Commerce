server:
  port: 8084

spring:
  application:
    name: search-service

  elasticsearch:
    uris: http://localhost:9200

  data:
    redis:
      host: localhost
      port: 6379
      database: 2

catalog:
  base-url: http://localhost:8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: search-service
