apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedding-service
  namespace: gocommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: embedding-service
  template:
    metadata:
      labels:
        app: embedding-service
    spec:
      containers:
        - name: embedding-service
          image: embedding-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8090
          envFrom:
            - configMapRef:
                name: gocommerce-config
          env:
            - name: EMBEDDING_MODEL_NAME
              value: "BAAI/bge-small-en-v1.5"
          resources:
            requests:
              cpu: "250m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: embedding-service
  namespace: gocommerce
spec:
  type: ClusterIP
  selector:
    app: embedding-service
  ports:
    - name: http
      port: 8090
      targetPort: http
