server:
  port: 8086

spring:
  application:
    name: analytics-service

  datasource:
    url: jdbc:postgresql://localhost:5432/ecom_analytics
    username: ecom_user
    password: ecom_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: analytics-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.gocommerce.analytics.events.OrderCreatedEvent
        spring.json.trusted.packages: com.gocommerce.analytics.events

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      service: analytics-service
    distribution:
      percentiles-histogram:
        http.server.requests: true

security:
  jwt:
    secret: "this_is_a_dev_secret_change_later_1234567890"
